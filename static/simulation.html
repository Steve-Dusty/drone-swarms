<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Swarm Simulation</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #hud {
            position: fixed;
            top: 24px;
            left: 24px;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            z-index: 10;
            pointer-events: none;
        }
        #hud h2 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        #hud p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #08080f;
            color: #e4e4e7;
            font-family: system-ui;
            font-size: 1rem;
            z-index: 100;
            transition: opacity 0.6s;
        }
        #loading.done { opacity: 0; pointer-events: none; }

        #environment-panel {
            position: fixed;
            left: 20px;
            bottom: 20px;
            width: 200px;
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 12px;
            z-index: 20;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        #environment-panel h3 {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .env-option {
            position: relative;
            display: flex;
            align-items: center;
            padding: 7px 8px;
            margin-bottom: 4px;
            background: transparent;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: rgba(255,255,255,0.65);
            font-size: 0.85rem;
        }

        .env-option:last-child {
            margin-bottom: 0;
        }

        .env-option:hover {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
        }

        .env-option.active {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .env-option.active::before {
            content: '';
            position: absolute;
            left: 0;
            width: 2px;
            height: 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 0 2px 2px 0;
        }

        .env-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }

        .env-option:hover .env-icon,
        .env-option.active .env-icon {
            opacity: 1;
        }

        .env-name {
            font-weight: 500;
            font-size: 0.8rem;
        }

        #formation-panel {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 200px;
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 12px;
            z-index: 20;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        #formation-panel h3 {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .formation-option {
            position: relative;
            display: flex;
            align-items: center;
            padding: 7px 8px;
            margin-bottom: 4px;
            background: transparent;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: rgba(255,255,255,0.65);
            font-size: 0.85rem;
        }

        .formation-option:last-child {
            margin-bottom: 0;
        }

        .formation-option:hover {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
        }

        .formation-option.active {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .formation-option.active::before {
            content: '';
            position: absolute;
            right: 0;
            width: 2px;
            height: 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 2px 0 0 2px;
        }

        .formation-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }

        .formation-option:hover .formation-icon,
        .formation-option.active .formation-icon {
            opacity: 1;
        }

        .formation-name {
            font-weight: 500;
            font-size: 0.8rem;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="loading">Loading drone model...</div>
    <div id="hud">
        <h2>Drone Swarm</h2>
        <p>10 drones &middot; 1 cursor-following &middot; drag to orbit &middot; scroll to zoom</p>
    </div>

    <div id="environment-panel">
        <h3>Environment</h3>
        <div class="env-option active" data-env="alpine">
            <div class="env-icon">🏔️</div>
            <div class="env-name">Alpine</div>
        </div>
        <div class="env-option" data-env="desert">
            <div class="env-icon">🏜️</div>
            <div class="env-name">Desert</div>
        </div>
        <div class="env-option" data-env="arctic">
            <div class="env-icon">❄️</div>
            <div class="env-name">Arctic</div>
        </div>
        <div class="env-option" data-env="volcanic">
            <div class="env-icon">🌋</div>
            <div class="env-name">Volcanic</div>
        </div>
        <div class="env-option" data-env="tropical">
            <div class="env-icon">🌴</div>
            <div class="env-name">Tropical</div>
        </div>
    </div>

    <div id="formation-panel">
        <h3>Formation</h3>
        <div class="formation-option active" data-formation="swarm">
            <div class="formation-icon">⚡</div>
            <div class="formation-name">Swarm</div>
        </div>
        <div class="formation-option" data-formation="delta">
            <div class="formation-icon">▶</div>
            <div class="formation-name">Delta Wing</div>
        </div>
        <div class="formation-option" data-formation="perimeter">
            <div class="formation-icon">⭕</div>
            <div class="formation-name">Perimeter</div>
        </div>
        <div class="formation-option" data-formation="grid">
            <div class="formation-icon">⊞</div>
            <div class="formation-name">Grid Matrix</div>
        </div>
        <div class="formation-option" data-formation="helix">
            <div class="formation-icon">🌀</div>
            <div class="formation-name">Helix</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ── Environment Presets ──
        const environments = {
            alpine: {
                name: 'Alpine Valley',
                skyColor: 0x7ec8e3,
                fogDensity: 0.0018,
                hemiSky: 0x87ceeb,
                hemiGround: 0x3a5f0b,
                sunColor: 0xfff5e6,
                sunIntensity: 3,
                waterColor: 0x1a6e8a,
                waterHeight: -8,
                terrainScale: 1.0,
                terrainColors: (h) => {
                    const t = Math.max(0, Math.min(1, (h + 35) / 70));
                    let r, g, b;
                    if (t < 0.25) {
                        r = 0.12; g = 0.28 + t * 1.2; b = 0.08;
                    } else if (t < 0.5) {
                        const s = (t - 0.25) / 0.25;
                        r = 0.15 + s * 0.2; g = 0.55 - s * 0.1; b = 0.08 + s * 0.04;
                    } else if (t < 0.7) {
                        const s = (t - 0.5) / 0.2;
                        r = 0.35 + s * 0.15; g = 0.30 + s * 0.05; b = 0.15 + s * 0.1;
                    } else if (t < 0.85) {
                        const s = (t - 0.7) / 0.15;
                        const gray = 0.45 + s * 0.2;
                        r = gray; g = gray; b = gray + 0.02;
                    } else {
                        const s = (t - 0.85) / 0.15;
                        const snow = 0.7 + s * 0.25;
                        r = snow; g = snow; b = snow + 0.03;
                    }
                    return [r, g, b];
                }
            },
            desert: {
                name: 'Desert Dunes',
                skyColor: 0xffd89b,
                fogDensity: 0.0025,
                hemiSky: 0xffe4b5,
                hemiGround: 0xd2691e,
                sunColor: 0xffeedd,
                sunIntensity: 4,
                waterColor: 0x8b7355,
                waterHeight: -25,
                terrainScale: 0.7,
                terrainColors: (h) => {
                    const t = Math.max(0, Math.min(1, (h + 35) / 70));
                    let r, g, b;
                    if (t < 0.4) {
                        r = 0.9 + t * 0.05; g = 0.7 + t * 0.1; b = 0.4 + t * 0.1;
                    } else if (t < 0.7) {
                        const s = (t - 0.4) / 0.3;
                        r = 0.85 - s * 0.1; g = 0.65 - s * 0.15; b = 0.35 - s * 0.1;
                    } else {
                        const s = (t - 0.7) / 0.3;
                        r = 0.75 + s * 0.15; g = 0.55 + s * 0.2; b = 0.30 + s * 0.15;
                    }
                    return [r, g, b];
                }
            },
            arctic: {
                name: 'Arctic Tundra',
                skyColor: 0xd0e8f0,
                fogDensity: 0.002,
                hemiSky: 0xe0f0ff,
                hemiGround: 0xaabbcc,
                sunColor: 0xeef5ff,
                sunIntensity: 2,
                waterColor: 0x0d5c7a,
                waterHeight: -10,
                terrainScale: 0.8,
                terrainColors: (h) => {
                    const t = Math.max(0, Math.min(1, (h + 35) / 70));
                    let r, g, b;
                    if (t < 0.3) {
                        r = 0.7 + t * 0.2; g = 0.75 + t * 0.15; b = 0.85 + t * 0.1;
                    } else if (t < 0.6) {
                        const s = (t - 0.3) / 0.3;
                        r = 0.8 + s * 0.15; g = 0.85 + s * 0.1; b = 0.92 + s * 0.05;
                    } else {
                        const s = (t - 0.6) / 0.4;
                        r = 0.92 + s * 0.05; g = 0.94 + s * 0.04; b = 0.97 + s * 0.02;
                    }
                    return [r, g, b];
                }
            },
            volcanic: {
                name: 'Volcanic Ridge',
                skyColor: 0x4a3535,
                fogDensity: 0.003,
                hemiSky: 0x6a4a4a,
                hemiGround: 0x2a1a1a,
                sunColor: 0xff7744,
                sunIntensity: 2.5,
                waterColor: 0x1a0f0f,
                waterHeight: -15,
                terrainScale: 1.2,
                terrainColors: (h) => {
                    const t = Math.max(0, Math.min(1, (h + 35) / 70));
                    let r, g, b;
                    if (t < 0.3) {
                        r = 0.15 + t * 0.1; g = 0.08 + t * 0.05; b = 0.08 + t * 0.02;
                    } else if (t < 0.6) {
                        const s = (t - 0.3) / 0.3;
                        r = 0.25 + s * 0.2; g = 0.12 + s * 0.08; b = 0.10 + s * 0.05;
                    } else {
                        const s = (t - 0.6) / 0.4;
                        r = 0.35 + s * 0.25; g = 0.18 + s * 0.12; b = 0.15 + s * 0.08;
                    }
                    return [r, g, b];
                }
            },
            tropical: {
                name: 'Tropical Islands',
                skyColor: 0x5fbfff,
                fogDensity: 0.0015,
                hemiSky: 0x87ceeb,
                hemiGround: 0x1a4d2e,
                sunColor: 0xfffacd,
                sunIntensity: 3.5,
                waterColor: 0x0ea5e9,
                waterHeight: 5,
                terrainScale: 0.9,
                terrainColors: (h) => {
                    const t = Math.max(0, Math.min(1, (h + 35) / 70));
                    let r, g, b;
                    if (t < 0.35) {
                        r = 0.95; g = 0.85; b = 0.65; // sand
                    } else if (t < 0.55) {
                        const s = (t - 0.35) / 0.2;
                        r = 0.15 + s * 0.1; g = 0.45 + s * 0.15; b = 0.12 + s * 0.08;
                    } else if (t < 0.75) {
                        const s = (t - 0.55) / 0.2;
                        r = 0.12 - s * 0.02; g = 0.55 - s * 0.1; b = 0.15 - s * 0.05;
                    } else {
                        const s = (t - 0.75) / 0.25;
                        r = 0.10 + s * 0.3; g = 0.45 - s * 0.1; b = 0.10 + s * 0.1;
                    }
                    return [r, g, b];
                }
            }
        };

        let currentEnv = 'alpine';

        // ── Formation Presets ──
        const formations = {
            swarm: {
                name: 'Swarm Attack',
                getPosition: (droneIndex, elapsed, baseFlight) => {
                    // Aggressive swarming behavior - drones cluster and move erratically
                    const swarmCenter = {
                        x: Math.sin(elapsed * 0.3) * 40,
                        z: Math.cos(elapsed * 0.3) * 40
                    };

                    const offset = droneIndex * 2.5;
                    const x = swarmCenter.x + Math.sin(elapsed * 0.8 + offset) * 25 + Math.cos(elapsed * 1.2 + offset) * 15;
                    const z = swarmCenter.z + Math.cos(elapsed * 0.8 + offset) * 25 + Math.sin(elapsed * 1.2 + offset) * 15;
                    const y = 40 + Math.sin(elapsed * 0.9 + offset) * 12;

                    return { x, y, z };
                }
            },
            delta: {
                name: 'Delta Wing',
                getPosition: (droneIndex, elapsed, baseFlight) => {
                    // V-formation moving forward
                    const formationSpeed = elapsed * 0.4;
                    const leaderX = Math.sin(formationSpeed) * 80;
                    const leaderZ = Math.cos(formationSpeed) * 80;

                    if (droneIndex === 0) {
                        // Leader at the front
                        return { x: leaderX, y: 45, z: leaderZ };
                    }

                    const side = droneIndex % 2 === 0 ? 1 : -1;
                    const row = Math.floor(droneIndex / 2);
                    const spacing = 15;

                    const angle = Math.atan2(Math.cos(formationSpeed), Math.sin(formationSpeed));
                    const offsetX = side * row * spacing * Math.cos(angle + Math.PI / 2);
                    const offsetZ = side * row * spacing * Math.sin(angle + Math.PI / 2);
                    const back = -row * spacing * 0.7;

                    const x = leaderX + offsetX + back * Math.sin(formationSpeed);
                    const z = leaderZ + offsetZ + back * Math.cos(formationSpeed);
                    const y = 45 - row * 2;

                    return { x, y, z };
                }
            },
            perimeter: {
                name: 'Perimeter Defense',
                getPosition: (droneIndex, elapsed, baseFlight) => {
                    // Drones patrol in a circle at different heights
                    const radius = 60;
                    const angleOffset = (droneIndex / 10) * Math.PI * 2;
                    const rotationSpeed = 0.3;
                    const angle = elapsed * rotationSpeed + angleOffset;

                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const heightVariation = Math.sin(droneIndex) * 15;
                    const y = 50 + heightVariation + Math.sin(elapsed + droneIndex) * 5;

                    return { x, y, z };
                }
            },
            grid: {
                name: 'Grid Matrix',
                getPosition: (droneIndex, elapsed, baseFlight) => {
                    // Precise grid formation that rotates slowly
                    const gridSize = 3;
                    const spacing = 30;
                    const row = Math.floor(droneIndex / gridSize);
                    const col = droneIndex % gridSize;

                    const centerOffset = (gridSize - 1) * spacing / 2;
                    const rotationSpeed = 0.15;
                    const angle = elapsed * rotationSpeed;

                    const localX = col * spacing - centerOffset;
                    const localZ = row * spacing - centerOffset;

                    // Rotate the grid
                    const x = localX * Math.cos(angle) - localZ * Math.sin(angle);
                    const z = localX * Math.sin(angle) + localZ * Math.cos(angle);

                    // Add gentle wave motion
                    const y = 45 + Math.sin(elapsed * 0.5 + droneIndex * 0.3) * 8;

                    return { x, y, z };
                }
            },
            helix: {
                name: 'Helix Spiral',
                getPosition: (droneIndex, elapsed, baseFlight) => {
                    // Drones spiral upward and downward in a helix pattern
                    const radius = 50;
                    const heightRange = 40;
                    const speed = 0.5;
                    const verticalSpeed = 0.4;

                    const angleOffset = (droneIndex / 10) * Math.PI * 2;
                    const angle = elapsed * speed + angleOffset;

                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;

                    // Spiral up and down
                    const verticalPhase = elapsed * verticalSpeed + droneIndex * 0.6;
                    const y = 40 + Math.sin(verticalPhase) * heightRange;

                    return { x, y, z };
                }
            }
        };

        let currentFormation = 'swarm';

        // ── Scene ──
        const scene = new THREE.Scene();
        const skyColor = environments[currentEnv].skyColor;
        scene.background = new THREE.Color(skyColor);
        scene.fog = new THREE.FogExp2(skyColor, environments[currentEnv].fogDensity);

        // ── Camera ──
        const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.5, 2000);
        camera.position.set(120, 80, 160);

        // ── Renderer ──
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        // ── Controls ──
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.maxPolarAngle = Math.PI / 2.05;
        controls.minDistance = 20;
        controls.maxDistance = 400;
        controls.target.set(0, 25, 0);
        controls.update();

        // ── Lighting ──
        const env = environments[currentEnv];
        const hemi = new THREE.HemisphereLight(env.hemiSky, env.hemiGround, 1.2);
        scene.add(hemi);

        const sun = new THREE.DirectionalLight(env.sunColor, env.sunIntensity);
        sun.position.set(150, 200, 100);
        sun.castShadow = true;
        sun.shadow.camera.top = 200;
        sun.shadow.camera.bottom = -200;
        sun.shadow.camera.left = -200;
        sun.shadow.camera.right = 200;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.bias = -0.0005;
        scene.add(sun);

        const ambient = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambient);

        // ── Terrain noise ──
        function terrainHeight(x, z, scale = 1.0) {
            let h = 0;
            h += Math.sin(x * 0.015 + 0.5) * Math.cos(z * 0.015 + 0.8) * 35 * scale;
            h += Math.sin(x * 0.035 + 1.3) * Math.cos(z * 0.028 + 2.1) * 18 * scale;
            h += Math.sin(x * 0.07 + 4.7) * Math.cos(z * 0.06 + 3.2) * 9 * scale;
            h += Math.sin(x * 0.15) * Math.cos(z * 0.12) * 4 * scale;
            h += Math.sin(x * 0.3 + 2.0) * Math.cos(z * 0.25 + 1.0) * 2 * scale;
            return h;
        }

        // ── Build terrain mesh ──
        const SIZE = 600;
        const SEGS = 256;
        const terrainGeo = new THREE.PlaneGeometry(SIZE, SIZE, SEGS, SEGS);
        terrainGeo.rotateX(-Math.PI / 2);

        const pos = terrainGeo.attributes.position.array;
        const colors = new Float32Array(pos.length);

        for (let i = 0; i < pos.length; i += 3) {
            const x = pos[i], z = pos[i + 2];
            const h = terrainHeight(x, z, env.terrainScale);
            pos[i + 1] = h;

            // Height-based vertex color using environment colors
            const [r, g, b] = env.terrainColors(h);

            colors[i] = r;
            colors[i + 1] = g;
            colors[i + 2] = b;
        }

        terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        terrainGeo.computeVertexNormals();

        const terrainMat = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.85,
            metalness: 0.0,
        });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        terrain.receiveShadow = true;
        scene.add(terrain);

        // ── Water plane ──
        const waterGeo = new THREE.PlaneGeometry(SIZE, SIZE);
        waterGeo.rotateX(-Math.PI / 2);
        const waterMat = new THREE.MeshStandardMaterial({
            color: env.waterColor,
            transparent: true,
            opacity: 0.55,
            roughness: 0.1,
            metalness: 0.6,
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.position.y = env.waterHeight;
        water.receiveShadow = true;
        scene.add(water);

        // ── Mouse tracking ──
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        const targetPosition = new THREE.Vector3(0, 40, 0);

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Create an invisible plane at a reasonable height for the cursor drone
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -40);
            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersectPoint);

            if (intersectPoint) {
                targetPosition.copy(intersectPoint);
                // Keep altitude at a reasonable height
                const th = terrainHeight(intersectPoint.x, intersectPoint.z);
                targetPosition.y = Math.max(th + 30, 40);
            }
        });

        // ── Load drones ──
        const drones = [];
        const DRONE_COUNT = 10;
        let cursorDrone = null; // The drone that follows the cursor

        const loader = new GLTFLoader();
        loader.load('/static/drone.glb', (gltf) => {
            const original = gltf.scene;

            // Normalize model size
            const box = new THREE.Box3().setFromObject(original);
            const dim = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(dim.x, dim.y, dim.z);
            const baseScale = 4 / maxDim;

            for (let i = 0; i < DRONE_COUNT; i++) {
                const drone = original.clone();
                drone.scale.setScalar(baseScale);

                drone.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                // Unique flight path parameters
                const angle = (i / DRONE_COUNT) * Math.PI * 2;
                drone.userData.flight = {
                    radius: 50 + Math.random() * 80,
                    radiusY: 0.5 + Math.random() * 0.5, // ellipse ratio
                    speed: 0.25 + Math.random() * 0.35,
                    altitude: 35 + Math.random() * 35,
                    phase: angle,
                    cx: (Math.random() - 0.5) * 100,
                    cz: (Math.random() - 0.5) * 100,
                    wobbleAmp: 1 + Math.random() * 2,
                    wobbleFreq: 2 + Math.random() * 2,
                    bankStrength: 0.25 + Math.random() * 0.2,
                    pattern: i % 3, // 0: circle, 1: ellipse, 2: figure-8
                };

                scene.add(drone);
                drones.push(drone);

                // First drone follows cursor
                if (i === 0) {
                    cursorDrone = drone;
                    drone.userData.isCursorDrone = true;
                }
            }

            // Hide loading screen
            document.getElementById('loading').classList.add('done');
        }, undefined, (err) => {
            console.error('Failed to load drone:', err);
            document.getElementById('loading').textContent = 'Failed to load drone model.';
        });

        // ── Path helpers ──
        function getPathXZ(pattern, t, radius, radiusY) {
            switch (pattern) {
                case 1: // ellipse
                    return [Math.cos(t) * radius, Math.sin(t) * radius * radiusY];
                case 2: // figure-8
                    return [Math.sin(t) * radius, Math.sin(t * 2) * radius * 0.4];
                default: // circle
                    return [Math.cos(t) * radius, Math.sin(t) * radius];
            }
        }

        // ── Animate ──
        const clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            // Update environment transition
            updateTransition(delta);

            for (let i = 0; i < drones.length; i++) {
                const drone = drones[i];

                if (drone.userData.isCursorDrone) {
                    // Cursor drone follows mouse
                    const currentPos = drone.position.clone();

                    // Smoothly interpolate towards target
                    drone.position.lerp(targetPosition, 0.08);

                    // Calculate direction for heading
                    const direction = new THREE.Vector3().subVectors(targetPosition, currentPos);

                    if (direction.length() > 0.1) {
                        // Point towards target
                        const targetRotationY = Math.atan2(direction.x, direction.z);
                        drone.rotation.y = targetRotationY;

                        // Bank based on movement speed
                        const speed = direction.length();
                        const cross = Math.sin(elapsed * 2) * speed * 0.02;
                        drone.rotation.z = -cross;
                    }
                } else {
                    // Drones follow formation pattern
                    const formation = formations[currentFormation];
                    const f = drone.userData.flight;

                    // Get formation position
                    const targetPos = formation.getPosition(i, elapsed, f);

                    // Store previous position for velocity calculation
                    if (!drone.userData.prevPos) {
                        drone.userData.prevPos = new THREE.Vector3();
                    }
                    drone.userData.prevPos.copy(drone.position);

                    // Smoothly move to formation position
                    drone.position.lerp(
                        new THREE.Vector3(targetPos.x, targetPos.y, targetPos.z),
                        0.05
                    );

                    // Calculate heading based on movement direction
                    const velocity = new THREE.Vector3().subVectors(drone.position, drone.userData.prevPos);

                    if (velocity.length() > 0.01) {
                        const targetRotationY = Math.atan2(velocity.x, velocity.z);
                        drone.rotation.y = targetRotationY;

                        // Bank based on lateral movement
                        const bankAmount = velocity.x * 0.3;
                        drone.rotation.z = -bankAmount;
                    }

                    // Add slight pitch based on vertical movement
                    const verticalVel = velocity.y;
                    drone.rotation.x = verticalVel * 0.1;
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        renderer.setAnimationLoop(animate);

        // ── Environment Switching with Smooth Transitions ──
        let isTransitioning = false;
        let transitionProgress = 0;
        let transitionDuration = 1.5; // seconds
        let targetEnv = null;
        let startEnv = null;

        // Helper to lerp colors
        function lerpColor(color1, color2, t) {
            const c1 = new THREE.Color(color1);
            const c2 = new THREE.Color(color2);
            return c1.lerp(c2, t);
        }

        function switchEnvironment(envName) {
            if (!environments[envName] || envName === currentEnv) return;

            // Start transition
            startEnv = currentEnv;
            targetEnv = envName;
            isTransitioning = true;
            transitionProgress = 0;

            // Update UI
            document.querySelectorAll('.env-option').forEach(el => {
                el.classList.toggle('active', el.dataset.env === envName);
            });
        }

        function updateTransition(delta) {
            if (!isTransitioning) return;

            transitionProgress += delta / transitionDuration;

            if (transitionProgress >= 1) {
                transitionProgress = 1;
                isTransitioning = false;
                currentEnv = targetEnv;
            }

            const t = transitionProgress;
            // Use easing for smoother transition
            const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            const oldEnv = environments[startEnv];
            const newEnv = environments[targetEnv];

            // Update sky and fog
            const skyColor = lerpColor(oldEnv.skyColor, newEnv.skyColor, eased);
            scene.background.copy(skyColor);
            scene.fog.color.copy(skyColor);
            scene.fog.density = oldEnv.fogDensity + (newEnv.fogDensity - oldEnv.fogDensity) * eased;

            // Update lighting
            hemi.color.copy(lerpColor(oldEnv.hemiSky, newEnv.hemiSky, eased));
            hemi.groundColor.copy(lerpColor(oldEnv.hemiGround, newEnv.hemiGround, eased));
            sun.color.copy(lerpColor(oldEnv.sunColor, newEnv.sunColor, eased));
            sun.intensity = oldEnv.sunIntensity + (newEnv.sunIntensity - oldEnv.sunIntensity) * eased;

            // Update water
            waterMat.color.copy(lerpColor(oldEnv.waterColor, newEnv.waterColor, eased));
            water.position.y = oldEnv.waterHeight + (newEnv.waterHeight - oldEnv.waterHeight) * eased;

            // Update terrain
            const pos = terrainGeo.attributes.position.array;
            const colors = terrainGeo.attributes.color.array;
            const terrainScale = oldEnv.terrainScale + (newEnv.terrainScale - oldEnv.terrainScale) * eased;

            for (let i = 0; i < pos.length; i += 3) {
                const x = pos[i], z = pos[i + 2];
                const h = terrainHeight(x, z, terrainScale);
                pos[i + 1] = h;

                const [r1, g1, b1] = oldEnv.terrainColors(h);
                const [r2, g2, b2] = newEnv.terrainColors(h);

                colors[i] = r1 + (r2 - r1) * eased;
                colors[i + 1] = g1 + (g2 - g1) * eased;
                colors[i + 2] = b1 + (b2 - b1) * eased;
            }

            terrainGeo.attributes.position.needsUpdate = true;
            terrainGeo.attributes.color.needsUpdate = true;
            terrainGeo.computeVertexNormals();
        }

        // Add click handlers to environment options
        document.querySelectorAll('.env-option').forEach(option => {
            option.addEventListener('click', () => {
                switchEnvironment(option.dataset.env);
            });
        });

        // ── Formation Switching ──
        function switchFormation(formationName) {
            if (!formations[formationName] || formationName === currentFormation) return;

            currentFormation = formationName;

            // Update UI
            document.querySelectorAll('.formation-option').forEach(el => {
                el.classList.toggle('active', el.dataset.formation === formationName);
            });
        }

        // Add click handlers to formation options
        document.querySelectorAll('.formation-option').forEach(option => {
            option.addEventListener('click', () => {
                switchFormation(option.dataset.formation);
            });
        });

        // ── Resize ──
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
</html>
