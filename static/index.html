<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Forge</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #08080f;
            color: #e4e4e7;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 25% 15%, rgba(0, 212, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 85%, rgba(139, 92, 246, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .container { max-width: 680px; margin: 0 auto; padding: 48px 24px 80px; }

        header { text-align: center; margin-bottom: 48px; }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #00d4ff 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle { color: #52525b; font-size: 1rem; margin-top: 6px; }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            transition: opacity 0.4s, border-color 0.4s;
        }

        .card.active { border-color: rgba(0, 212, 255, 0.15); }
        .card.disabled { opacity: 0.3; pointer-events: none; }

        .step-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #00d4ff;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .card h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 18px; }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #e4e4e7;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            min-height: 90px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        textarea:focus { border-color: rgba(0, 212, 255, 0.35); }
        textarea::placeholder { color: #3f3f46; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #a1a1aa;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            color: #e4e4e7;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

        .image-container {
            margin-top: 18px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .image-container img { width: 100%; display: block; }

        model-viewer {
            width: 100%;
            height: 420px;
            border-radius: 12px;
            background: radial-gradient(ellipse at center, #111118 0%, #08080f 100%);
            margin-top: 18px;
            --poster-color: transparent;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 44px 20px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(0, 212, 255, 0.15);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: #52525b; font-size: 0.85rem; }

        .error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 10px;
            padding: 14px 16px;
            color: #fca5a5;
            margin-top: 14px;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Drone Forge</h1>
            <p class="subtitle">Text &rarr; Image &rarr; 3D Model</p>
            <a href="/simulation" class="btn btn-secondary" style="margin-top: 16px; text-decoration: none; display: inline-flex;">Launch Swarm Simulation</a>
        </header>

        <!-- Step 1: Prompt -->
        <div class="card active" id="step1">
            <div class="step-label">Step 1</div>
            <h2>Describe Your Drone</h2>
            <textarea id="prompt" placeholder="A futuristic racing drone with neon blue accents and carbon fiber body, highly detailed product shot on white background"></textarea>
            <div class="btn-group">
                <button class="btn btn-primary" id="generateBtn" onclick="generateImage()">Generate Image</button>
            </div>
            <div id="step1Error" class="error hidden"></div>
        </div>

        <!-- Step 2: Preview -->
        <div class="card disabled" id="step2">
            <div class="step-label">Step 2</div>
            <h2>Preview &amp; Approve</h2>
            <div id="imageLoading" class="loading hidden">
                <div class="spinner"></div>
                <span class="loading-text">Generating image with Gemini&hellip;</span>
            </div>
            <div id="imagePreview" class="hidden">
                <div class="image-container">
                    <img id="generatedImage" alt="Generated drone" />
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="generateImage()">Regenerate</button>
                    <button class="btn btn-primary" id="approveBtn" onclick="approve3D()">Approve &rarr; Generate 3D</button>
                </div>
            </div>
            <div id="step2Error" class="error hidden"></div>
        </div>

        <!-- Step 3: 3D Model -->
        <div class="card disabled" id="step3">
            <div class="step-label">Step 3</div>
            <h2>3D Model</h2>
            <div id="modelLoading" class="loading hidden">
                <div class="spinner"></div>
                <span class="loading-text">Generating 3D model with Trellis&hellip; this may take a minute</span>
            </div>
            <div id="modelPreview" class="hidden">
                <model-viewer
                    id="modelViewer"
                    alt="Generated 3D model"
                    auto-rotate
                    camera-controls
                    touch-action="pan-y"
                    shadow-intensity="1"
                    environment-image="neutral"
                    tone-mapping="aces"
                ></model-viewer>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="downloadModel()">Download .glb</button>
                    <button class="btn btn-primary" onclick="startOver()">Start Over</button>
                </div>
            </div>
            <div id="step3Error" class="error hidden"></div>
        </div>
    </div>

    <script>
        let currentImageBase64 = null;
        let currentModelUrl = null;

        document.getElementById('prompt').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateImage();
            }
        });

        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) return;

            hide('step1Error');
            hide('step2Error');

            activate('step2');
            show('imageLoading');
            hide('imagePreview');
            deactivate('step3');
            hide('modelPreview');
            hide('modelLoading');

            document.getElementById('generateBtn').disabled = true;

            try {
                const res = await fetch('/api/generate-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt }),
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to generate image');

                currentImageBase64 = data.image_base64;
                const mime = data.mime_type || 'image/png';
                document.getElementById('generatedImage').src = `data:${mime};base64,${data.image_base64}`;

                hide('imageLoading');
                show('imagePreview');
            } catch (err) {
                hide('imageLoading');
                showError('step2Error', err.message);
            } finally {
                document.getElementById('generateBtn').disabled = false;
            }
        }

        async function approve3D() {
            if (!currentImageBase64) return;

            hide('step3Error');
            activate('step3');
            show('modelLoading');
            hide('modelPreview');

            document.getElementById('approveBtn').disabled = true;

            try {
                const res = await fetch('/api/generate-3d', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_base64: currentImageBase64 }),
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to generate 3D model');

                currentModelUrl = data.model_url;
                document.getElementById('modelViewer').src = data.model_url;

                hide('modelLoading');
                show('modelPreview');
            } catch (err) {
                hide('modelLoading');
                showError('step3Error', err.message);
            } finally {
                document.getElementById('approveBtn').disabled = false;
            }
        }

        function downloadModel() {
            if (currentModelUrl) window.open(currentModelUrl, '_blank');
        }

        function startOver() {
            document.getElementById('prompt').value = '';
            currentImageBase64 = null;
            currentModelUrl = null;
            deactivate('step2');
            deactivate('step3');
            hide('imagePreview');
            hide('modelPreview');
            hide('imageLoading');
            hide('modelLoading');
            document.getElementById('prompt').focus();
        }

        function activate(id) {
            const el = document.getElementById(id);
            el.classList.remove('disabled');
            el.classList.add('active');
        }

        function deactivate(id) {
            const el = document.getElementById(id);
            el.classList.add('disabled');
            el.classList.remove('active');
        }

        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
